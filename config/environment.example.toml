schema_version = "0.1"
project_name = "realworld-project"

[privacy]
allow_cloud_processing = false
notes = "Raw construction-site video and extracted frames stay local unless the user explicitly approves cloud processing."

[paths]
data_root = "data"
windows_data_root = ""
raw_video_dir = "data/raw/videos"
frame_dir = "data/interim/frames"
mask_dir = "data/interim/masks"
reconstruction_dir = "artifacts/reconstruction"
unity_project_dir = "unity"
unity_project_windows_dir = ""
asset_dir = "assets"
capture_dir = "captures"
export_dir = "exports"

[tools]
python = ">=3.11"
unity = "TBD"
blender = "TBD"
ffmpeg = "TBD"
colmap = "TBD"

[assets.refinery_glb]
enabled = false
root_path = ""
windows_root_path = ""
source_path = ""
mesh_dir = ""
gap_fallback_fbx = ""
commit_asset_to_git = false
relationship_to_site_video = "unrelated"
intended_phase = "Phase 3/4 import validation; Phase 6/7 installation sequencing"
intended_use = "Import pipeline, scale/origin validation, GLB material checks, collider proxy generation, refinery-specific sandbox scene, and later 4D installation sequence playback."
excluded_use = "Do not use as geometry evidence for the construction-site video reconstruction."

[assets.refinery_schedule_csv]
enabled = false
source_path = ""
encoding = "cp949"
commit_asset_to_git = false
relationship_to_site_video = "unrelated"
intended_phase = "Phase 6/7"
intended_use = "Installation order, task timeline, object mapping, and 4D sequencing simulation for the refinery sandbox."
excluded_use = "Do not use for construction-site video reconstruction timing or geometry assumptions."

[assets.refinery_unity_subset]
enabled = false
source_dir = ""
windows_source_dir = ""
manifest_path = ""
max_meshes = 50
copy_meshes = true
commit_asset_to_git = false
relationship_to_site_video = "unrelated"
intended_phase = "Phase 3 import smoke test; Phase 6/7 schedule playback seed"
intended_use = "Small high-confidence GLB/task subset for Unity import, scale/origin validation, hierarchy inspection, and schedule-driven visibility tests."
excluded_use = "Do not treat as construction-site reconstruction evidence or as final full-refinery coverage."
